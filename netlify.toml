[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[redirects]]
  from = "/api/create-payment-intent"
  to = "/.netlify/functions/create-payment-intent"
  status = 200

[[redirects]]
  from = "/api/payment-config"
  to = "/.netlify/functions/payment-config"
  status = 200

[[redirects]]
  from = "/covenant"
  to = "/covenant.html"
  status = 200

[[redirects]]
  from = "/preserves"
  to = "/preserves.html"
  status = 200

[[redirects]]
  from = "/give"
  to = "/give.html"
  status = 200

[[redirects]]
  from = "/contribute"
  to = "/give.html"
  status = 200
